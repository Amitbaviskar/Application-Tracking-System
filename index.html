<!DOCTYPE html>
<html>
<head>
    <title>ATS System</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #2563eb, #9333ea);
        }

        .header {
            height: 70px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .app-box {
            width: 94%;
            height: calc(100% - 100px);
            margin: 0 auto 20px auto;
            border-radius: 18px;
            overflow: hidden;
            border: 3px solid rgba(255,255,255,0.4);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            background: white;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>

    <div class="header">
        🚀 ATS Resume Analyzer
    </div>

    <div class="app-box">
        <iframe 
            src="https://jobfit.streamlit.app/?embedded=true"
            scrolling="auto">
        </iframe>
    </div>

</body>
</html>
