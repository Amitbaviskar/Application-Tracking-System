<!DOCTYPE html>
<html>
<head>
    <title>ATS System</title>

    <style type="text/css">

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;

            /* Background Gradient */
            background: linear-gradient(135deg, #0f172a, #1e293b, #2563eb);

            /* Center effect */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Animated glowing background circles */
        body::before,
        body::after{
            content: "";
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: 0;
        }

        body::before{
            width: 300px;
            height: 300px;
            background: #38bdf8;
            top: 10%;
            left: 10%;
        }

        body::after{
            width: 350px;
            height: 350px;
            background: #9333ea;
            bottom: 10%;
            right: 10%;
        }

        /* Main container */
        .frame-container{
            width: 95%;
            height: 95%;
            position: relative;
            z-index: 1;

            border-radius: 20px;
            overflow: hidden;

            border: 2px solid rgba(255,255,255,0.2);

            box-shadow:
                0 0 25px rgba(0,0,0,0.4),
                0 0 40px rgba(59,130,246,0.3);

            backdrop-filter: blur(10px);
        }

        iframe{
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        /* Top Header Bar */
        .header{
            position: absolute;
            top: 15px;
            left: 30px;
            z-index: 2;

            color: white;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;

            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

    </style>
</head>

<body>

    <div class="header">🚀 ATS Resume Analyzer</div>

    <div class="frame-container">
        <iframe 
            src="https://jobfit.streamlit.app/?embedded=true"
            frameborder="0"
            scrolling="auto">
        </iframe>
    </div>

</body>
</html>
